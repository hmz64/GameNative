name: Build Debug APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup JDK 17 (required for AGP 8.x)
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Setup Gradle 8.2 secara eksplisit
      #    (runner default sudah Gradle 9.x yang tidak kompatibel dengan project ini)
      - name: Setup Gradle 8.2
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      # 4. Generate gradlew pakai Gradle 8.2 yang sudah di-setup
      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.2
        working-directory: android

      # 5. Grant execute permission ke gradlew
      - name: Grant Gradlew Permission
        run: chmod +x android/gradlew

      # 6. Cache Gradle dependencies
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 7. Build Debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        working-directory: android

      # 8. Upload APK sebagai artifact
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: quiz-game-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
